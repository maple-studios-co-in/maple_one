name: Deploy staging
on:
  push:
    branches: [staging]
  workflow_dispatch: {}
concurrency: staging
jobs:
  deploy:
    # Gated OFF until a real staging box + *.stg.maplefurnishers.com exist.
    # Enable by setting repo/Environment variable STAGING_ENABLED=true (Settings > Variables).
    if: ${{ vars.STAGING_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: staging            # set DEPLOY_HOST/USER/SSH_KEY under GitHub > Environments > staging
    steps:
      - name: Deploy (staging -> staging box)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/maple
            git fetch origin staging
            git checkout staging
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
